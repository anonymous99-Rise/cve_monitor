<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>威胁情报</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* 现代化配色方案 */
        :root {
            --primary-color: #4285f4;
            --secondary-color: #34a853;
            --accent-color: #fbbc05;
            --danger-color: #ea4335;
            --text-primary: #202124;
            --text-secondary: #5f6368;
            --text-muted: #9aa0a6;
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --bg-tertiary: #f1f3f4;
            --border-color: #e0e0e0;
            --shadow-sm: 0 1px 2px 0 rgba(60, 64, 67, 0.3);
            --shadow-md: 0 1px 3px 0 rgba(60, 64, 67, 0.3), 0 4px 8px 3px rgba(60, 64, 67, 0.15);
            --border-radius: 8px;
            --transition: all 0.2s ease-in-out;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            line-height: 1.6;
            color: var(--text-primary);
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: var(--bg-secondary);
            font-size: 16px;
        }
        
        /* 标题样式 */
        header {
            background: linear-gradient(135deg, var(--primary-color), #3367d6);
            color: white;
            padding: 30px;
            border-radius: var(--border-radius);
            text-align: center;
            margin-bottom: 30px;
            box-shadow: var(--shadow-md);
        }
        
        h1 {
            margin: 0 0 10px 0;
            font-size: 2.2rem;
            font-weight: 700;
        }
        
        h2 {
            font-size: 1.5rem;
            margin-top: 30px;
            margin-bottom: 15px;
            color: var(--primary-color);
            font-weight: 600;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--bg-tertiary);
        }
        
        /* 报告列表 */
        .report-list {
            list-style: none;
            padding: 0;
        }
        
        .report-item {
            background-color: var(--bg-primary);
            padding: 20px;
            margin-bottom: 15px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .report-item:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        
        .report-link {
            color: var(--primary-color);
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 600;
            transition: var(--transition);
            flex: 1;
            min-width: 200px;
        }
        
        .report-link:hover {
            text-decoration: underline;
            color: #3367d6;
        }
        
        .report-info {
            color: var(--text-secondary);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-shrink: 0;
        }
        
        .report-count {
            font-weight: 600;
            color: var(--primary-color);
        }
        
        /* 统计信息 */
        .stats {
            background-color: var(--bg-primary);
            padding: 20px;
            margin-bottom: 30px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-sm);
        }
        
        .stat-item {
            display: inline-block;
            margin-right: 30px;
            margin-bottom: 10px;
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-right: 8px;
        }
        
        .stat-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary-color);
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }
            
            header {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .report-item {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .report-link {
                width: 100%;
            }
        }
        
        /* 页脚样式 */
        footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
            border-top: 1px solid var(--border-color);
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        
        .empty-state h3 {
            color: var(--text-secondary);
            margin-bottom: 10px;
        }
    </style>
</head>
